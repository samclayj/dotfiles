set-window-option -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

set -g base-index 1 # start windows at index 2
set -g pane-base-index 1
# Status bar general layout & styling
set -g status on
set -g status-interval 5
set -g status-keys vi                     # Use vi-style keys for navigation
set -g status-justify left                # Align windows to the left
set -g status-style "bg=colour235,fg=colour247"

# Left side: Vibrant, high-contrast block banner for the session name
set -g status-left-length 50
set -g status-left "#[bg=colour39,fg=colour232,bold]  #S  #[bg=colour235,fg=colour39,nobold] "

# Right side: Clean date and bold time
set -g status-right-length 50
set -g status-right "#[fg=colour245] %Y-%m-%d #[fg=colour254,bold] %H:%M "

# Format for inactive windows
set -g window-status-format " #[fg=colour244]#I:#W "

# Format for the active window (distinct highlighting block)
set -g window-status-current-format " #[bg=colour238,fg=colour254,bold] #I:#W #[default] "

unbind C-b                # Unbind the default prefix (Ctrl-b)
set-option -g prefix C-a  # Set the new prefix (e.g., Ctrl-a)
bind C-a send-prefix      # Ensure the new prefix key works with nested tmux sessions

# Pane resizing.
bind -r J resize-pane -D
bind -r K resize-pane -U
bind -r L resize-pane -R
bind -r H resize-pane -L

bind-key 0 select-window -t 0
bind-key 1 select-window -t 1
bind-key 2 select-window -t 2
bind-key 3 select-window -t 3
bind-key 4 select-window -t 4
bind-key 5 select-window -t 5
bind-key 6 select-window -t 6
bind-key 7 select-window -t 7
bind-key 8 select-window -t 8
bind-key 9 select-window -t 9

# iPad specific fixes
# Clean slate with minimal settings focused on vertical splits
set -g default-terminal "tmux-256color"
set -as terminal-features ',*:utf8'
set -g pane-border-lines simple
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour240
# Force tmux to not use extended characters for vertical lines
set -ga terminal-overrides '*:enacs@:smacs@:rmacs@:acsc@'
